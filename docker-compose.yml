services:
  # ── FastAPI Backend ─────────────────────────────────────────
  api:
    build: .
    container_name: vision-rag-api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ── Streamlit Frontend ──────────────────────────────────────
  streamlit:
    build: .
    container_name: vision-rag-ui
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_started
    command: ["streamlit", "run", "streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    environment:
      - API_BASE=http://api:8000
    restart: unless-stopped

volumes:
  chroma_data:
